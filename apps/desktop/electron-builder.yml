appId: com.flowm.desktop
productName: FlowM
directories:
  output: release
files:
  - out/**
  - package.json
asarUnpack:
  - "**/*.node"
extraResources:
  - from: resources/flowm-demo.sqlite3
    to: flowm-demo.sqlite3
  - from: ../../packages/db/migrations
    to: migrations
npmRebuild: true
mac:
  icon: resources/icons/flowm.icns
  target:
    - dmg
win:
  target:
    - nsis
linux:
  target:
    - AppImage
