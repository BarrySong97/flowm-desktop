name: flowm_mobile
description: Flowm mobile app shell.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.28.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.37
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.5.4
  drift_dev: ^2.28.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/flowm-demo.sqlite3
