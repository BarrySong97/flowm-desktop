packages:
  - "apps/*"
  - "packages/*"

# Shared dependency versions. Reference with "catalog:" in package.json so the
# whole workspace stays on one version of React, Tailwind, HeroUI, etc.
catalog:
  react: ^19.2.0
  react-dom: ^19.2.0
  "@types/react": ^19.1.8
  "@types/react-dom": ^19.1.6
  typescript: ~5.8.3
  tailwindcss: ^4.1.17
  "@tailwindcss/postcss": ^4.1.17
  "@heroui/react": ^3.1.0
  "@heroui/styles": ^3.1.0
  clsx: ^2.1.1
  tailwind-merge: ^3.4.0
