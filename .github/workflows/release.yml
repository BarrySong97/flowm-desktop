name: Release

# Cuts a GitHub Release with signed installers + electron-updater metadata
# whenever a v* tag is pushed. Bump apps/desktop/package.json first, then tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed for the GITHUB_TOKEN to create/upload the Release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon → builds arm64 dmg + zip, signs + notarizes
          - os: windows-latest # builds nsis installer
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules for Electron
        run: pnpm -F desktop exec electron-builder install-app-deps

      - name: Build renderer/main/preload
        run: pnpm -F desktop build

      - name: Configure Apple signing (optional)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::warning::No APPLE_CERTIFICATE secret - building unsigned and un-notarized."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "ELECTRON_BUILDER_EXTRA_ARGS=-c.mac.notarize=false" >> "$GITHUB_ENV"
            exit 0
          fi

          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          append_env() {
            local name="$1"
            local value="$2"
            local marker="${name}_EOF"
            {
              echo "$name<<$marker"
              printf '%s\n' "$value"
              echo "$marker"
            } >> "$GITHUB_ENV"
          }

          append_env "CSC_LINK" "$APPLE_CERTIFICATE"
          append_env "CSC_KEY_PASSWORD" "$APPLE_CERTIFICATE_PASSWORD"
          append_env "CSC_NAME" "${APPLE_SIGNING_IDENTITY#Developer ID Application: }"
          append_env "APPLE_API_KEY" "$KEY_PATH"
          append_env "APPLE_API_KEY_ID" "$APPLE_API_KEY"
          append_env "APPLE_API_ISSUER" "$APPLE_API_ISSUER"

      - name: Build and publish
        run: pnpm -F desktop exec electron-builder --publish always $ELECTRON_BUILDER_EXTRA_ARGS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
