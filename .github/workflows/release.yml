name: Release

# Cuts a GitHub Release with signed installers + electron-updater metadata
# whenever a v* tag is pushed. Bump apps/desktop/package.json first, then tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed for the GITHUB_TOKEN to create/upload the Release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon → builds arm64 dmg + zip, signs + notarizes
          - os: windows-latest # builds nsis installer
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules for Electron
        run: pnpm -F desktop exec electron-builder install-app-deps

      - name: Build renderer/main/preload
        run: pnpm -F desktop build

      - name: Build and publish
        run: pnpm -F desktop exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (only present/used on the macOS runner).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
